<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>电商用户行为分析看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 20px; background: #f5f7fa; }
        h1 { text-align: center; color: #1f2d3d; margin-bottom: 20px; }
        .chart-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            width: 45%;
            min-width: 400px;
            margin: 10px;
        }
        .chart-card h3 {
            text-align: center;
            margin-top: 0;
            color: #333;
        }
        .chart-card .chart {
            width: 100%;
            height: 400px;
        }
        .full-width {
            width: 94%;
            margin: 0 auto 30px;
        }
        @media (max-width: 900px) {
            .chart-card { width: 90%; }
        }
    </style>
</head>
<body>
<h1>📊 电商用户行为数据看板</h1>

<div class="chart-row">
    <div class="chart-card">
        <h3>📈 每日活跃用户 (DAU) 趋势</h3>
        <div id="dauChart" class="chart"></div>
    </div>
    <div class="chart-card">
        <h3>🔁 用户行为转化漏斗</h3>
        <div id="funnelChart" class="chart"></div>
    </div>
</div>

<div class="chart-row full-width">
    <div class="chart-card" style="width: 96%;">
        <h3>🔥 热门商品点击 Top 10</h3>
        <div id="hotChart" class="chart" style="height: 450px;"></div>
    </div>
</div>

<script>
    // 1. DAU 折线图
    $.get('/api/dau', function(data) {
        var chart = echarts.init(document.getElementById('dauChart'));
        chart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: data.dates, name: '日期', axisLabel: { rotate: 30 } },
            yAxis: { type: 'value', name: '活跃用户数' },
            series: [{ type: 'line', data: data.dau, smooth: true, areaStyle: { opacity: 0.3 }, lineStyle: { color: '#5470c6', width: 3 }, symbol: 'circle' }]
        });
    });

    // 2. 转化漏斗图
    $.get('/api/funnel', function(data) {
        var chart = echarts.init(document.getElementById('funnelChart'));
        var funnelData = [];
        for (var i = 0; i < data.steps.length; i++) {
            funnelData.push({ name: data.steps[i], value: data.counts[i] });
        }
        chart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} 人' },
            series: [{
                type: 'funnel',
                data: funnelData,
                sort: 'descending',
                gap: 2,
                label: { show: true, position: 'inside' },
                itemStyle: { borderColor: '#fff', borderWidth: 1 }
            }]
        });
    });

    // 3. 热门商品柱状图
    $.get('/api/hot_products', function(data) {
        var chart = echarts.init(document.getElementById('hotChart'));
        chart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            xAxis: { type: 'category', data: data.products, name: '商品', axisLabel: { rotate: 45, interval: 0 } },
            yAxis: { type: 'value', name: '点击次数' },
            series: [{ type: 'bar', data: data.clicks, itemStyle: { color: '#91cc75', borderRadius: [4,4,0,0] } }]
        });
    });
</script>
</body>
</html>
